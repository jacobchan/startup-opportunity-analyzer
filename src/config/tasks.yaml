market_analysis:
  description: >
    对以下创业方向进行深入的市场分析：{startup_idea}

    请完成以下分析：
    1. 市场规模估算（TAM/SAM/SOM），引用可查证的公开数据
    2. 市场增长趋势（年增长率及驱动因素）
    3. 目标用户画像（谁会买单、付费意愿、决策路径）
    4. 市场时机分析（为什么现在是做这件事的好时机/坏时机）
    5. 市场进入方式建议（PLG/SLG/渠道等）
  expected_output: >
    一份结构化的市场分析报告，包含数据支撑的市场规模估算、
    用户画像和时机判断。每个关键论点都需要有数据来源。
  agent: market_analyst

competitor_analysis:
  description: >
    对以下创业方向进行竞品和行业分析：{startup_idea}

    请完成以下分析：
    1. 找到至少5个直接竞品和3个间接竞品/替代方案
    2. 对每个竞品分析：商业模式、定价策略、融资阶段、核心优势、明显短板
    3. 竞争格局判断（蓝海/红海/垄断），市场集中度如何
    4. 识别竞品普遍未解决的用户痛点（差异化机会）
    5. 分析行业进入壁垒（技术、牌照、渠道、网络效应等）
  expected_output: >
    一份竞品分析报告，包含竞品对比表格、竞争格局判断
    和差异化机会识别。重点关注竞品的短板和未满足的需求。
  agent: competitor_researcher

risk_review:
  description: >
    基于已有的市场分析和竞品分析结果，对以下创业方向进行风险评估：{startup_idea}

    请从以下维度逐一评估：
    1. 技术风险：技术实现难度、技术栈成熟度、是否需要AI模型训练
    2. 市场风险：市场是否真实存在、用户付费意愿是否足够、获客成本预估
    3. 团队风险：这个方向需要什么样的核心团队能力
    4. 资金风险：启动资金需求、烧钱速度、盈亏平衡点预估
    5. 政策合规风险：是否有监管不确定性
    6. 时机风险：窗口期是否合适，是否太早或太晚

    对每个风险给出等级（高/中/低）和具体的风险缓解措施。
  expected_output: >
    一份风险评估报告，按维度列出风险等级、风险描述和缓解措施。
    最后给出整体风险评级和关键风险提示。
  agent: risk_reviewer

strategy_report:
  description: >
    基于市场分析、竞品分析和风险评估的所有结论，
    为以下创业方向输出最终的创业机会评估报告：{startup_idea}

    报告必须包含：
    1. Executive Summary（一句话结论 + Go/No-Go/Conditional-Go判断）
    2. 市场机会总结（核心数据和结论）
    3. 竞争优势建议（基于竞品分析，推荐差异化策略）
    4. 关键风险提示（Top 3风险及应对）
    5. 下一步行动建议（如果Go，建议的MVP范围和验证计划）
    6. 资金需求估算（启动阶段3-6个月的资金需求）
  expected_output: >
    一份完整的创业机会评估报告（Markdown格式），结构清晰，
    结论明确。包含明确的Go/No-Go/Conditional-Go判断
    和具体的下一步行动建议。报告应该能让一个创业者
    在10分钟内做出是否深入的判断。
  agent: strategy_advisor
